<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cursos</title>
    <style>
        table, th, td { border: 1px solid #ddd; border-collapse: collapse; padding: 6px; }
    </style>
</head>
<body>
    <h1>Lista de Cursos</h1>
    <a th:href="@{/cursos/nuevo}">+ Nuevo Curso</a>
    <br/><br/>
    <table>
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Créditos</th><th>Estudiantes inscritos</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            <tr th:each="curso : ${cursos}">
                <td th:text="${curso.id}">1</td>
                <td th:text="${curso.nombre}">Matemáticas</td>
                <td th:text="${curso.creditos}">3</td>
                <td>
                    <span th:each="est, iterStat : ${curso.estudiantes}">
                        <span th:text="${est.nombre + ' ' + est.apellido}"></span><span th:if="${!iterStat.last}">, </span>
                    </span>
                </td>
                <td>
                    <a th:href="@{/cursos/{id}/inscribir(id=${curso.id})}">Inscribir estudiantes</a>
                </td>
            </tr>
        </tbody>
    </table>
    <br/>
    <a href="/estudiantes">← Volver a Estudiantes</a>
</body>
</html>

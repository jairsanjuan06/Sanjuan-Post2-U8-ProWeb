<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        a { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Lista de Estudiantes</h1>
    <a th:href="@{/estudiantes/nuevo}">+ Nuevo Estudiante</a>
    <br/><br/>
    <table>
        <thead>
            <tr><th>Nombre</th><th>Apellido</th><th>Correo</th><th>Carrera</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            <tr th:each="est : ${estudiantes}">
                <td th:text="${est.nombre}"></td>
                <td th:text="${est.apellido}"></td>
                <td th:text="${est.correo}"></td>
                <td th:text="${est.carrera}"></td>
                <td>
                    <a th:href="@{/estudiantes/editar/{id}(id=${est.id})}">Editar</a>
                    <a th:href="@{/estudiantes/eliminar/{id}(id=${est.id})}">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>

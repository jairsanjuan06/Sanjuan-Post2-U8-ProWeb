<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación</title>
</head>
<body>
    <h1>Eliminar Estudiante</h1>
    <p>¿Estás seguro de eliminar al estudiante <strong th:text="${estudiante.nombre} + ' ' + ${estudiante.apellido}"></strong>?</p>
    <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
        <button type="submit">Sí, eliminar</button>
        <a th:href="@{/estudiantes}">Cancelar</a>
    </form>
</body>
</html>
